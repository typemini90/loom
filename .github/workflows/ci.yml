name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Ensure jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Rust Format Check
        run: make fmt-check

      - name: Rust Lint
        run: make lint

      - name: Rust Tests
        run: make test

      - name: TS Bindings Drift Check
        run: |
          if ! git diff --exit-code panel/src/generated/; then
            echo "::error::ts-rs generated bindings are out of date. Run 'cargo test' locally and commit panel/src/generated/ changes."
            exit 1
          fi

      - name: Panel Typecheck
        run: make panel-typecheck

      - name: Panel Tests
        run: make panel-test

      - name: Panel Build
        run: make panel-build

      - name: Agent E2E
        run: make e2e

      - name: Performance Smoke
        run: make perf-smoke
